repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint
  - repo: local
    hooks:
      - id: test
        name: test
        language: system
        entry: make
        args: ["test"]
        pass_filenames: false
        types: [go]
      - id: kube-lint
        name: kube-lint
        language: system
        entry: make
        args: ["kube-lint"]
        pass_filenames: false
        files: ^deploy/helm/
      - id: k8s-lint
        name: k8s-lint
        language: system
        entry: make
        args: ["k8s-lint"]
        pass_filenames: false
        files: ^deploy/helm/
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.16.3
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
