{{- if .Values.snapshotValidationWebhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "upcloud-csi.fullname" . }}-snapshot-validation-webhook
  labels:
    {{- include "upcloud-csi.labels" . | nindent 4 }}
webhooks:
  - name: validation-webhook.snapshot.storage.k8s.io
    clientConfig:
      service:
        name: {{ include "upcloud-csi.fullname" . }}-snapshot-validation-service
        namespace: {{ .Release.Namespace }}
        path: /volumesnapshot
      {{- if .Values.snapshotValidationWebhook.caBundle }}
      caBundle: {{ .Values.snapshotValidationWebhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["snapshot.storage.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["volumesnapshotclasses"]
        scope: "*"
    failurePolicy: Ignore
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: {{ .Values.snapshotValidationWebhook.timeoutSeconds }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "upcloud-csi.fullname" . }}-snapshot-validation-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upcloud-csi.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "upcloud-csi.fullname" . }}-snapshot-validation
  ports:
    - port: 443
      targetPort: 443
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "upcloud-csi.fullname" . }}-snapshot-validation-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upcloud-csi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.snapshotValidationWebhook.replicas }}
  selector:
    matchLabels:
      {{- include "upcloud-csi.selectorLabels" . | nindent 6 }}
      app: {{ include "upcloud-csi.fullname" . }}-snapshot-validation
  template:
    metadata:
      labels:
        {{- include "upcloud-csi.selectorLabels" . | nindent 8 }}
        app: {{ include "upcloud-csi.fullname" . }}-snapshot-validation
{{- with .Values.snapshotValidationWebhook.podLabels }}
{{ tpl (toYaml .) $ | indent 8 }}
{{- end }}
      annotations:
{{- with .Values.snapshotValidationWebhook.podAnnotations }}
{{ tpl (toYaml .) $ | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ .Values.controller.serviceAccountName | default (printf "%s-controller" (include "upcloud-csi.fullname" .)) }}
      {{- with .Values.snapshotValidationWebhook.nodeSelector }}
      nodeSelector:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.snapshotValidationWebhook.tolerations }}
      tolerations:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.snapshotValidationWebhook.affinity }}
      affinity:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: snapshot-validation-webhook
          image: "{{ .Values.snapshotValidationWebhook.image.repository }}:{{ .Values.snapshotValidationWebhook.image.tag }}"
          imagePullPolicy: {{ .Values.snapshotValidationWebhook.image.pullPolicy }}
          args:
            - "--v={{ .Values.snapshotValidationWebhook.logLevel | default .Values.logLevel }}"
            - "--tls-cert-file=/etc/snapshot-validation-webhook/certs/cert.pem"
            - "--tls-private-key-file=/etc/snapshot-validation-webhook/certs/key.pem"
            - "--http-endpoint=:8080"
          ports:
            - containerPort: 443
              protocol: TCP
            - containerPort: 8080
              name: metrics
              protocol: TCP
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/snapshot-validation-webhook/certs
              readOnly: true
          {{- with .Values.snapshotValidationWebhook.resources }}
          resources:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ .Values.snapshotValidationWebhook.tlsSecretName }}
{{- end }}
