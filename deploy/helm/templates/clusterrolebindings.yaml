apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "upcloud-csi.fullname" . }}-node-driver-registrar-binding
  labels:
    {{- include "upcloud-csi.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.node.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "upcloud-csi.fullname" . }}-node-driver-registrar-role
  apiGroup: rbac.authorization.k8s.io

