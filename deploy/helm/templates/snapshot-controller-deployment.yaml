apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "upcloud-csi.fullname" . }}-snapshot-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "upcloud-csi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.snapshotController.replicas }}
  minReadySeconds: {{ .Values.snapshotController.minReadySeconds }}
  {{- if .Values.snapshotController.revisionHistoryLimit }}
  revisionHistoryLimit: {{ .Values.snapshotController.revisionHistoryLimit }}
  {{- end }}
  {{- with .Values.snapshotController.updateStrategy }}
  strategy:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- else }}
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  {{- end }}
  selector:
    matchLabels:
      {{- include "upcloud-csi.selectorLabels" . | nindent 6 }}
      app: {{ include "upcloud-csi.fullname" . }}-snapshot-controller
  template:
    metadata:
      labels:
        {{- include "upcloud-csi.selectorLabels" . | nindent 8 }}
        app: {{ include "upcloud-csi.fullname" . }}-snapshot-controller
{{- with .Values.snapshotController.podLabels }}
{{ tpl (toYaml .) $ | indent 8 }}
{{- end }}
      annotations:
{{- with .Values.snapshotController.podAnnotations }}
{{ tpl (toYaml .) $ | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ .Values.controller.serviceAccountName | default (printf "%s-controller" (include "upcloud-csi.fullname" .)) }}
      priorityClassName: {{ .Values.snapshotController.priorityClassName }}
      {{- with .Values.snapshotController.nodeSelector }}
      nodeSelector:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.snapshotController.tolerations }}
      tolerations:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.snapshotController.affinity }}
      affinity:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.snapshotController.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.snapshotController.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.snapshotController.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.snapshotController.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with .Values.snapshotController.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.snapshotController.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: snapshot-controller
          image: "{{ .Values.snapshotController.image.repository }}:{{ .Values.snapshotController.image.tag }}"
          imagePullPolicy: {{ .Values.snapshotController.image.pullPolicy }}
          args:
            - "--v={{ .Values.snapshotController.logLevel | default .Values.logLevel }}"
            - "--leader-election=true"
            - "--http-endpoint=:8080"
          {{- with .Values.snapshotController.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.snapshotController.resources }}
          resources:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          {{- with .Values.snapshotController.lifecycle }}
          lifecycle:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
      {{- with .Values.snapshotController.additionalVolumeMounts }}
          volumeMounts:
            {{- tpl (toYaml .) $ | nindent 12 }}
      {{- end }}
      {{- with .Values.snapshotController.additionalVolumes }}
      volumes:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}

