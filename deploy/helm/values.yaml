# -- Overrides the chart name.
nameOverride: ""

# -- Overrides the full name.
fullnameOverride: ""

# -- Common labels added to all resources.
commonLabels: {}

# -- Default log verbosity, overridable per component.
logLevel: 5

# Credentials for UpCloud API access.
# Reference an existing secret, or have the chart create one.
credentials:  # @schema additionalProperties: false
  createSecret: false
  # -- Name of the secret (created or referenced).
  secretName: upcloud
  # -- Key within the secret that holds the UpCloud username.
  usernameKey: username
  # -- Key within the secret that holds the UpCloud password.
  passwordKey: password
  # -- UpCloud username (required when createSecret is true).
  username: ""
  # -- UpCloud password (required when createSecret is true).
  password: ""

csiDriver:  # @schema additionalProperties: false
  # -- Name of the CSIDriver resource.
  name: storage.csi.upcloud.com
  attachRequired: true
  podInfoOnMount: true
  # -- fsGroupPolicy for the CSI driver
  fsGroupPolicy: File  # @schema enum:["File","None","ReadWriteOnceWithFSType"]

# -- Driver container image (shared by controller and node).
image:  # @schema additionalProperties: false
  repository: ghcr.io/upcloud-tools/upcloud-csi
  tag: ""
  pullPolicy: IfNotPresent

# Controller StatefulSet settings.
controller:  # @schema additionalProperties: false
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:  # @schema type:[integer, null]; minimum:0; maximum:10

  # -- Image pull secrets for controller pods.
  imagePullSecrets: []

  # -- Driver container resources (controller).
  resources: {}

  sidecars:
    csiProvisioner:
      repository: registry.k8s.io/sig-storage/csi-provisioner
      tag: v5.3.0
      pullPolicy: IfNotPresent
      resources: {}
    csiAttacher:
      repository: registry.k8s.io/sig-storage/csi-attacher
      tag: v4.12.0
      pullPolicy: IfNotPresent
      resources: {}
    csiResizer:
      repository: registry.k8s.io/sig-storage/csi-resizer
      tag: v2.2.0
      pullPolicy: IfNotPresent
      resources: {}
    csiSnapshotter:
      repository: registry.k8s.io/sig-storage/csi-snapshotter
      tag: v8.6.0
      pullPolicy: IfNotPresent
      resources: {}

  replicas: 1  # @schema minimum:0
  # -- ServiceAccount name (defaults to {fullname}-controller).
  serviceAccountName: ""
  # -- Annotations for the controller service account.
  serviceAccountAnnotations: {}
  priorityClassName: system-cluster-critical
  # -- Extra labels for the controller pod template.
  podLabels: {}
  # -- Extra annotations for the controller pod template.
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  podDisruptionBudget:  # @schema additionalProperties: false
    enabled: false
    maxUnavailable:  # @schema type:[string, integer, null]
    minAvailable:  # @schema type:[string, integer, null]

# Node DaemonSet settings.
node:  # @schema additionalProperties: false
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:  # @schema type:[integer, null]; minimum:0; maximum:10

  # -- Image pull secrets for node pods.
  imagePullSecrets: []

  sidecars:
    csiNodeDriverRegistrar:
      repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
      tag: v2.17.0
      pullPolicy: IfNotPresent
      resources: {}

  # -- Driver container resources (node).
  resources: {}

  # -- ServiceAccount name (defaults to {fullname}-node).
  serviceAccountName: ""
  # -- Annotations for the node service account.
  serviceAccountAnnotations: {}
  priorityClassName: system-node-critical
  # -- Extra labels for the node pod template.
  podLabels: {}
  # -- Extra annotations for the node pod template.
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Snapshot controller Deployment settings.
snapshotController:  # @schema additionalProperties: false
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:  # @schema type:[integer, null]; minimum:0; maximum:10

  # -- Image pull secrets for snapshot controller pods.
  imagePullSecrets: []

  image:
    repository: registry.k8s.io/sig-storage/snapshot-controller
    tag: v8.6.0
    pullPolicy: IfNotPresent
  resources: {}

  replicas: 2  # @schema minimum:0
  minReadySeconds: 15  # @schema minimum:0
  priorityClassName: system-cluster-critical
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # -- Extra labels for the snapshot controller pod template.
  podLabels: {}
  # -- Extra annotations for the snapshot controller pod template.
  podAnnotations: {}

  podDisruptionBudget:  # @schema additionalProperties: false
    enabled: false
    maxUnavailable:  # @schema type:[string, integer, null]
    minAvailable:  # @schema type:[string, integer, null]

# Snapshot validation webhook settings. (Beta, not yet recommended to use in production)
# The webhook requires a TLS secret to be created before enabling:
#   kubectl create secret generic snapshot-validation-secret --from-file=cert.pem --from-file=key.pem
# See https://github.com/kubernetes-csi/external-snapshotter/tree/master/deploy/kubernetes/webhook-example
# for instructions on generating certificates.
snapshotValidationWebhook:  # @schema additionalProperties: false
  enabled: false

  # -- Image pull secrets for webhook pods.
  imagePullSecrets: []

  image:
    repository: registry.k8s.io/sig-storage/snapshot-validation-webhook
    tag: v8.6.0
    pullPolicy: IfNotPresent
  resources: {}

  # -- Name of the TLS secret (must contain cert.pem and key.pem).
  tlsSecretName: snapshot-validation-secret

  # -- Optional CA bundle for validating webhook TLS (base64-encoded).
  # Useful for validating webhook TLS when using a custom CA, like with a self-signed certificate.
  caBundle: ""

  # -- Admission webhook timeout in seconds.
  timeoutSeconds: 5  # @schema minimum:1

  replicas: 1  # @schema minimum:0
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # -- Extra labels for the snapshot validation webhook pod template.
  podLabels: {}
  # -- Extra annotations for the snapshot validation webhook pod template.
  podAnnotations: {}

# StorageClasses managed by the chart.
storageClasses:  # @schema additionalProperties: false
  enabled: false
  classes:
    - name: upcloud-block-storage-maxiops
      tier: maxiops
      isDefault: true
      reclaimPolicy: Retain
      allowVolumeExpansion: true
    - name: upcloud-block-storage-hdd
      tier: hdd
      isDefault: false
      reclaimPolicy: Retain
      allowVolumeExpansion: true
    - name: upcloud-block-storage-standard
      tier: standard
      isDefault: false
      reclaimPolicy: Retain
      allowVolumeExpansion: true

# VolumeSnapshotClass settings.
volumeSnapshotClass:  # @schema additionalProperties: false
  enabled: true
  name: upcloud-csi-snapshotclass
  deletionPolicy: Delete

# -- Extra Kubernetes objects to deploy as part of this release.
# Supports Go template expressions.
extraObjects: []
