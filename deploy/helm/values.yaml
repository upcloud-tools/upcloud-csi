# -- Overrides the chart name.
nameOverride: ""

# -- Overrides the full name.
fullnameOverride: ""

# -- Common labels added to all resources.
commonLabels: {}

# -- Default log verbosity, overridable per component.
logLevel: 5

# Credentials for UpCloud API access.
# Reference an existing secret, or have the chart create one.
credentials:  # @schema additionalProperties: false
  createSecret: false
  # -- Name of the secret (created or referenced).
  secretName: upcloud
  # -- Key within the secret that holds the UpCloud API token.
  tokenKey: token  # @schema type:string
  # -- UpCloud API token (required when createSecret is true).
  token: ""

csiDriver:  # @schema additionalProperties: false
  # -- Name of the CSIDriver resource.
  name: storage.csi.upcloud.com
  attachRequired: true
  podInfoOnMount: true
  # -- fsGroupPolicy for the CSI driver
  fsGroupPolicy: File  # @schema enum:["File","None","ReadWriteOnceWithFSType"]

# -- Driver container image (shared by controller and node).
image:  # @schema additionalProperties: false
  repository: ghcr.io/upcloud-tools/upcloud-csi
  tag: ""
  pullPolicy: IfNotPresent

# Controller StatefulSet settings.
controller:  # @schema additionalProperties: false
  # -- UpCloud zone (e.g. de-fra1). Auto-detected from node hostname if empty.
  zone: ""  # @schema type:string
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:  # @schema type:[integer, null]; minimum:0; maximum:10

  # -- Image pull secrets for controller pods.
  imagePullSecrets: []

  # -- Driver container resources (controller).
  resources: {}

  sidecars:
    csiProvisioner:
      repository: registry.k8s.io/sig-storage/csi-provisioner
      tag: v5.3.0
      pullPolicy: IfNotPresent
      resources: {}
    csiAttacher:
      repository: registry.k8s.io/sig-storage/csi-attacher
      tag: v4.12.0
      pullPolicy: IfNotPresent
      resources: {}
    csiResizer:
      repository: registry.k8s.io/sig-storage/csi-resizer
      tag: v2.2.0
      pullPolicy: IfNotPresent
      resources: {}
    csiSnapshotter:
      repository: registry.k8s.io/sig-storage/csi-snapshotter
      tag: v8.6.0
      pullPolicy: IfNotPresent
      resources: {}

  replicas: 1  # @schema minimum:0
  # -- ServiceAccount name (defaults to {fullname}-controller).
  serviceAccountName: ""
  # -- Annotations for the controller service account.
  serviceAccountAnnotations: {}
  priorityClassName: system-cluster-critical
  # -- Extra labels for the controller pod template.
  podLabels: {}
  # -- Extra annotations for the controller pod template.
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  updateStrategy: {}
  # -- Minimum ready seconds for the controller StatefulSet.
  minReadySeconds:
  # -- Revision history limit for the controller StatefulSet.
  revisionHistoryLimit:
  # -- Termination grace period for controller pods.
  terminationGracePeriodSeconds:  # @schema type:[integer, null]
  # -- Lifecycle hooks for controller pods.
  lifecycle: {}
  # -- Topology spread constraints for controller pods.
  topologySpreadConstraints: []
  # -- Runtime class name for controller pods.
  runtimeClassName: ""
  # -- DNS policy for controller pods.
  dnsPolicy: ""
  # -- DNS config for controller pods.
  dnsConfig: {}
  # -- Host aliases for controller pods.
  hostAliases: []
  # -- Init containers for controller pods.
  initContainers: []
  # -- Additional volumes for controller pods.
  additionalVolumes: []
  # -- Additional volume mounts for the controller driver container.
  additionalVolumeMounts: []
  # -- Container security context for all controller containers.
  securityContext:  # @schema additionalProperties: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
  # -- Pod-level security context for controller pods.
  podSecurityContext:  # @schema additionalProperties: false
    seccompProfile:
      type: RuntimeDefault

  podDisruptionBudget:  # @schema additionalProperties: false
    enabled: false
    maxUnavailable:  # @schema type:[string, integer, null]
    minAvailable:  # @schema type:[string, integer, null]

# Node DaemonSet settings.
node:  # @schema additionalProperties: false
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:  # @schema type:[integer, null]; minimum:0; maximum:10

  # -- Image pull secrets for node pods.
  imagePullSecrets: []

  sidecars:
    csiNodeDriverRegistrar:
      repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
      tag: v2.17.0
      pullPolicy: IfNotPresent
      resources: {}

  # -- Driver container resources (node).
  resources: {}

  # -- ServiceAccount name (defaults to {fullname}-node).
  serviceAccountName: ""
  # -- Annotations for the node service account.
  serviceAccountAnnotations: {}
  priorityClassName: system-node-critical
  # -- Extra labels for the node pod template.
  podLabels: {}
  # -- Extra annotations for the node pod template.
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  updateStrategy: {}
  # -- Minimum ready seconds for the node DaemonSet.
  minReadySeconds:
  # -- Revision history limit for the node DaemonSet.
  revisionHistoryLimit:
  # -- Termination grace period for node pods.
  terminationGracePeriodSeconds:  # @schema type:[integer, null]
  # -- Lifecycle hooks for node pods.
  lifecycle: {}
  # -- Topology spread constraints for node pods.
  topologySpreadConstraints: []
  # -- Runtime class name for node pods.
  runtimeClassName: ""
  # -- DNS policy for node pods.
  dnsPolicy: ""
  # -- DNS config for node pods.
  dnsConfig: {}
  # -- Host aliases for node pods.
  hostAliases: []
  # -- Init containers for node pods.
  initContainers: []
  # -- Additional volumes for node pods.
  additionalVolumes: []
  # -- Additional volume mounts for the node driver container.
  additionalVolumeMounts: []
  # -- Container security context for all node containers.
  securityContext:  # @schema additionalProperties: false
    privileged: true
    capabilities:
      add: ["SYS_ADMIN"]
      drop: ["ALL"]
    allowPrivilegeEscalation: true
  # -- Pod-level security context for node pods.
  podSecurityContext:  # @schema additionalProperties: false
    seccompProfile:
      type: RuntimeDefault

# Snapshot controller Deployment settings.
snapshotController:  # @schema additionalProperties: false
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:  # @schema type:[integer, null]; minimum:0; maximum:10

  # -- Image pull secrets for snapshot controller pods.
  imagePullSecrets: []

  image:
    repository: registry.k8s.io/sig-storage/snapshot-controller
    tag: v8.6.0
    pullPolicy: IfNotPresent
  resources: {}

  replicas: 2  # @schema minimum:0
  minReadySeconds: 15  # @schema minimum:0
  # -- Revision history limit for the snapshot controller Deployment.
  revisionHistoryLimit:
  priorityClassName: system-cluster-critical
  nodeSelector: {}
  tolerations: []
  affinity: {}
  updateStrategy: {}
  # -- Termination grace period for snapshot controller pods.
  terminationGracePeriodSeconds:  # @schema type:[integer, null]
  # -- Lifecycle hooks for snapshot controller pods.
  lifecycle: {}
  # -- Topology spread constraints for snapshot controller pods.
  topologySpreadConstraints: []
  # -- Init containers for snapshot controller pods.
  initContainers: []
  # -- Additional volumes for snapshot controller pods.
  additionalVolumes: []
  # -- Additional volume mounts for the snapshot controller container.
  additionalVolumeMounts: []
  # -- Container security context for the snapshot controller container.
  securityContext:  # @schema additionalProperties: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
  # -- Pod-level security context for snapshot controller pods.
  podSecurityContext:  # @schema additionalProperties: false
    seccompProfile:
      type: RuntimeDefault
  # -- Extra labels for the snapshot controller pod template.
  podLabels: {}
  # -- Extra annotations for the snapshot controller pod template.
  podAnnotations: {}

  podDisruptionBudget:  # @schema additionalProperties: false
    enabled: false
    maxUnavailable:  # @schema type:[string, integer, null]
    minAvailable:  # @schema type:[string, integer, null]

# Snapshot validation webhook settings. (Beta, not yet recommended to use in production)
# The webhook requires a TLS secret to be created before enabling:
#   kubectl create secret generic snapshot-validation-secret --from-file=cert.pem --from-file=key.pem
# See https://github.com/kubernetes-csi/external-snapshotter/tree/master/deploy/kubernetes/webhook-example
# for instructions on generating certificates.
snapshotValidationWebhook:  # @schema additionalProperties: false
  enabled: false

  # -- Image pull secrets for webhook pods.
  imagePullSecrets: []

  image:
    repository: registry.k8s.io/sig-storage/snapshot-validation-webhook
    tag: v8.1.1
    pullPolicy: IfNotPresent
  resources: {}

  # -- Name of the TLS secret (must contain cert.pem and key.pem).
  tlsSecretName: snapshot-validation-secret

  # -- Optional CA bundle for validating webhook TLS (base64-encoded).
  # Useful for validating webhook TLS when using a custom CA, like with a self-signed certificate.
  caBundle: ""

  # -- Admission webhook timeout in seconds.
  timeoutSeconds: 5  # @schema minimum:1

  # -- Webhook failure policy. Ignore admits if webhook is down, Fail rejects.
  failurePolicy: Ignore  # @schema enum:["Ignore","Fail"]

  replicas: 1  # @schema minimum:0
  # -- Minimum ready seconds for the webhook Deployment.
  minReadySeconds:
  # -- Revision history limit for the webhook Deployment.
  revisionHistoryLimit:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  updateStrategy: {}
  # -- Termination grace period for webhook pods.
  terminationGracePeriodSeconds:  # @schema type:[integer, null]
  # -- Lifecycle hooks for webhook pods.
  lifecycle: {}
  # -- Topology spread constraints for webhook pods.
  topologySpreadConstraints: []
  # -- Init containers for webhook pods.
  initContainers: []
  # -- Additional volumes for webhook pods.
  additionalVolumes: []
  # -- Additional volume mounts for the webhook container.
  additionalVolumeMounts: []
  # -- Container security context for the webhook container.
  securityContext:  # @schema additionalProperties: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
  # -- Pod-level security context for webhook pods.
  podSecurityContext:  # @schema additionalProperties: false
    seccompProfile:
      type: RuntimeDefault
  # -- Extra labels for the snapshot validation webhook pod template.
  podLabels: {}
  # -- Extra annotations for the snapshot validation webhook pod template.
  podAnnotations: {}

  podDisruptionBudget:  # @schema additionalProperties: false
    enabled: false
    maxUnavailable:  # @schema type:[string, integer, null]
    minAvailable:  # @schema type:[string, integer, null]

# StorageClasses managed by the chart.
storageClasses:  # @schema additionalProperties: false
  enabled: false
  classes:
    - name: upcloud-block-storage-maxiops
      tier: maxiops
      isDefault: true
      reclaimPolicy: Retain
      allowVolumeExpansion: true
    - name: upcloud-block-storage-hdd
      tier: hdd
      isDefault: false
      reclaimPolicy: Retain
      allowVolumeExpansion: true
    - name: upcloud-block-storage-standard
      tier: standard
      isDefault: false
      reclaimPolicy: Retain
      allowVolumeExpansion: true

# VolumeSnapshotClass settings.
volumeSnapshotClass:  # @schema additionalProperties: false
  enabled: true
  name: upcloud-csi-snapshotclass
  deletionPolicy: Delete

# -- Metrics configuration for Prometheus scraping.
metrics:  # @schema additionalProperties: false
  # -- Enable metrics endpoints and service (adds --http-endpoint to sidecars).
  enabled: true
  serviceMonitor:
    # -- Enable ServiceMonitor resource (requires prometheus-operator CRDs).
    enabled: false
    interval: 30s
    # -- Additional labels for the ServiceMonitor.
    additionalLabels: {}
  prometheusRule:
    # -- Enable PrometheusRule resource.
    enabled: false
    # -- Additional labels for the PrometheusRule.
    additionalLabels: {}
    # -- Prometheus alerting rules.
    rules: []

# -- Network policies for restricting pod communication.
networkPolicy:
  # -- Enable NetworkPolicy resources.
  enabled: false

# -- Extra Kubernetes objects to deploy as part of this release.
# Supports Go template expressions. Chart labels are not auto-applied;
# use {{ include "upcloud-csi.labels" . }} explicitly if needed.
extraObjects: []
