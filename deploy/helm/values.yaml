# -- Overrides the chart name.
nameOverride: ""

# -- Overrides the full name.
fullnameOverride: ""

# -- Default log verbosity, overridable per component.
logLevel: 5

# Credentials for UpCloud API access.
# Reference an existing secret, or have the chart create one.
credentials:
  # -- Create the secret in the release namespace.
  createSecret: false
  # -- Name of the secret (created or referenced).
  secretName: upcloud
  # -- Key within the secret that holds the UpCloud username.
  usernameKey: username
  # -- Key within the secret that holds the UpCloud password.
  passwordKey: password
  # -- UpCloud username (required when createSecret is true).
  username: ""
  # -- UpCloud password (required when createSecret is true).
  password: ""

csiDriver:
  # -- Name of the CSIDriver resource.
  name: storage.csi.upcloud.com
  attachRequired: true
  podInfoOnMount: true
  # -- fsGroupPolicy for the CSI driver (File, None, or ReadWriteOnceWithFSType).
  fsGroupPolicy: File

# Controller StatefulSet settings.
controller:
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:

  # -- Driver container image.
  image:
    repository: ghcr.io/upcloudltd/upcloud-csi
    tag: ""
    pullPolicy: Always

  # -- Driver container resources.
  resources: {}

  sidecars:
    csiProvisioner:
      image: registry.k8s.io/sig-storage/csi-provisioner:v5.3.0
      pullPolicy: Always
      resources: {}
    csiAttacher:
      image: registry.k8s.io/sig-storage/csi-attacher:v4.12.0
      pullPolicy: Always
      resources: {}
    csiResizer:
      image: registry.k8s.io/sig-storage/csi-resizer:v2.2.0
      pullPolicy: Always
      resources: {}
    csiSnapshotter:
      image: registry.k8s.io/sig-storage/csi-snapshotter:v8.6.0
      pullPolicy: Always
      resources: {}

  replicas: 1
  serviceAccountName: csi-upcloud-controller-sa
  priorityClassName: system-cluster-critical
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Node DaemonSet settings.
node:
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:

  sidecars:
    csiNodeDriverRegistrar:
      image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.17.0
      pullPolicy: Always
      resources: {}

  serviceAccountName: csi-upcloud-node-sa
  priorityClassName: system-node-critical
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Snapshot controller Deployment settings.
snapshotController:
  # -- Log verbosity level.
  # -- Log verbosity (inherits global logLevel when null).
  logLevel:

  image: registry.k8s.io/sig-storage/snapshot-controller:v8.6.0
  pullPolicy: IfNotPresent
  resources: {}

  replicas: 2
  minReadySeconds: 15
  serviceAccountName: csi-upcloud-controller-sa
  priorityClassName: system-cluster-critical
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Snapshot validation webhook settings.
snapshotValidationWebhook:
  # -- Enable the snapshot validation webhook.
  enabled: false

  image: registry.k8s.io/sig-storage/snapshot-validation-webhook:v8.6.0
  pullPolicy: IfNotPresent
  resources: {}

  replicas: 3
  serviceAccountName: csi-upcloud-node-sa
  nodeSelector: {}
  tolerations: []
  affinity: {}

# StorageClasses managed by the chart.
storageClasses:
  enabled: true
  classes:
    - name: upcloud-block-storage-maxiops
      tier: maxiops
      isDefault: true
      reclaimPolicy: Retain
      allowVolumeExpansion: true
    - name: upcloud-block-storage-hdd
      tier: hdd
      isDefault: false
      reclaimPolicy: Retain
      allowVolumeExpansion: true
    - name: upcloud-block-storage-standard
      tier: standard
      isDefault: false
      reclaimPolicy: Retain
      allowVolumeExpansion: true

# VolumeSnapshotClass settings.
volumeSnapshotClass:
  enabled: true
  name: upcloud-csi-snapshotclass
  deletionPolicy: Delete
