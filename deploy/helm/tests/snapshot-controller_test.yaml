suite: snapshot controller
tests:
  - it: should render snapshot controller deployment with defaults
    template: snapshot-controller-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-upcloud-csi-snapshot-controller
      - equal:
          path: spec.replicas
          value: 2
      - equal:
          path: spec.minReadySeconds
          value: 15
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-cluster-critical

  - it: should have correct container name
    template: snapshot-controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: snapshot-controller

  - it: should have http-endpoint argument
    template: snapshot-controller-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --http-endpoint=:8080

  - it: should have metrics port
    template: snapshot-controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: metrics

  - it: should have liveness and readiness probes
    template: snapshot-controller-deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should support custom log level
    set:
      snapshotController:
        logLevel: 8
    template: snapshot-controller-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --v=8

  - it: should inherit global log level
    set:
      logLevel: 3
    template: snapshot-controller-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --v=3
