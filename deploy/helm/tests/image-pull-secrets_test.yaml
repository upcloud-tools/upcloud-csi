suite: image pull secrets
tests:
  - it: should not render imagePullSecrets when empty
    template: controller-statefulset.yaml
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: should render imagePullSecrets on controller when set
    set:
      controller:
        imagePullSecrets:
          - name: my-registry-creds
    template: controller-statefulset.yaml
    asserts:
      - exists:
          path: spec.template.spec.imagePullSecrets
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-creds

  - it: should render imagePullSecrets on node when set
    set:
      node:
        imagePullSecrets:
          - name: my-registry-creds
    template: node-daemonset.yaml
    asserts:
      - exists:
          path: spec.template.spec.imagePullSecrets
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-creds

  - it: should render imagePullSecrets on snapshot controller when set
    set:
      snapshotController:
        imagePullSecrets:
          - name: my-registry-creds
    template: snapshot-controller-deployment.yaml
    asserts:
      - exists:
          path: spec.template.spec.imagePullSecrets
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-creds

  - it: should render imagePullSecrets on webhook when set
    set:
      snapshotValidationWebhook:
        enabled: true
        imagePullSecrets:
          - name: my-registry-creds
    template: snapshot-webhook.yaml
    asserts:
      - documentIndex: 2
        exists:
          path: spec.template.spec.imagePullSecrets
      - documentIndex: 2
        equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-creds

  - it: should render multiple imagePullSecrets
    set:
      controller:
        imagePullSecrets:
          - name: creds-one
          - name: creds-two
    template: controller-statefulset.yaml
    asserts:
      - lengthEqual:
          path: spec.template.spec.imagePullSecrets
          count: 2
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: creds-one
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: creds-two
