suite: storage classes
tests:
  - it: should not render storage classes by default
    template: storageclasses.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render all storage classes when enabled
    set:
      storageClasses:
        enabled: true
    template: storageclasses.yaml
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: upcloud-block-storage-maxiops
        documentIndex: 0
      - equal:
          path: parameters.tier
          value: maxiops
        documentIndex: 0
      - equal:
          path: metadata.annotations["storageclass.kubernetes.io/is-default-class"]
          value: "true"
        documentIndex: 0
      - equal:
          path: reclaimPolicy
          value: Retain
        documentIndex: 0
      - equal:
          path: metadata.name
          value: upcloud-block-storage-hdd
        documentIndex: 1
      - equal:
          path: parameters.tier
          value: hdd
        documentIndex: 1
      - equal:
          path: metadata.name
          value: upcloud-block-storage-standard
        documentIndex: 2
      - equal:
          path: parameters.tier
          value: standard
        documentIndex: 2
      - equal:
          path: provisioner
          value: storage.csi.upcloud.com
        documentIndex: 0
