suite: storage classes
tests:
  - it: should not render storage classes by default
    template: storageclasses.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render all storage classes when enabled
    set:
      storageClasses:
        enabled: true
    template: storageclasses.yaml
    asserts:
      - hasDocuments:
          count: 5
      - equal:
          path: metadata.name
          value: upcloud-block-storage-maxiops
        documentIndex: 0
      - equal:
          path: metadata.name
          value: upcloud-block-storage-hdd
        documentIndex: 1
      - equal:
          path: metadata.name
          value: upcloud-block-storage-standard
        documentIndex: 2
      - equal:
          path: metadata.name
          value: upcloud-file-storage
        documentIndex: 3
      - equal:
          path: parameters.type
          value: nfs
        documentIndex: 3
      - equal:
          path: metadata.name
          value: upcloud-file-storage-encrypted
        documentIndex: 4
      - equal:
          path: parameters.type
          value: nfs
        documentIndex: 4
      - equal:
          path: parameters.encryption
          value: data-at-rest
        documentIndex: 4
