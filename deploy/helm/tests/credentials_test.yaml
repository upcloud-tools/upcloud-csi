suite: credentials
tests:
  - it: should not render secret by default
    template: secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render secret when createSecret is true
    set:
      credentials:
        createSecret: true
        username: myuser
        password: mypass
    template: secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: upcloud

  - it: should fail when createSecret is true but username is empty
    set:
      credentials:
        createSecret: true
        username: ""
        password: mypass
    template: secret.yaml
    asserts:
      - failedTemplate:
          errorMessage: credentials.username is required when createSecret is true

  - it: should fail when createSecret is true but password is empty
    set:
      credentials:
        createSecret: true
        username: myuser
        password: ""
    template: secret.yaml
    asserts:
      - failedTemplate:
          errorMessage: credentials.password is required when createSecret is true

  - it: should use custom secret name
    set:
      credentials:
        createSecret: true
        secretName: custom-creds
        username: myuser
        password: mypass
    template: secret.yaml
    asserts:
      - equal:
          path: metadata.name
          value: custom-creds

  - it: should use custom key names
    set:
      credentials:
        createSecret: true
        usernameKey: UPCLOUD_USER
        passwordKey: UPCLOUD_PASS
        username: myuser
        password: mypass
    template: secret.yaml
    asserts:
      - equal:
          path: stringData.UPCLOUD_USER
          value: myuser
      - equal:
          path: stringData.UPCLOUD_PASS
          value: mypass
