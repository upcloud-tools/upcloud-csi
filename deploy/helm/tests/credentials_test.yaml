suite: credentials
tests:
  - it: should not render secret by default
    template: secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render secret when createSecret is true
    set:
      credentials:
        createSecret: true
        token: mytoken
    template: secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: upcloud
      - equal:
          path: stringData.token
          value: mytoken

  - it: should fail when createSecret is true but token is empty
    set:
      credentials:
        createSecret: true
        token: ""
    template: secret.yaml
    asserts:
      - failedTemplate:
          errorMessage: credentials.token is required when createSecret is true

  - it: should use custom secret name
    set:
      credentials:
        createSecret: true
        secretName: custom-creds
        token: mytoken
    template: secret.yaml
    asserts:
      - equal:
          path: metadata.name
          value: custom-creds
      - equal:
          path: stringData.token
          value: mytoken

  - it: should use custom tokenKey
    set:
      credentials:
        createSecret: true
        tokenKey: my-token-key
        token: mytoken
    template: secret.yaml
    asserts:
      - equal:
          path: stringData.my-token-key
          value: mytoken

  - it: controller should have UPCLOUD_TOKEN env var
    template: controller-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[4].env[3].name
          value: UPCLOUD_TOKEN
      - equal:
          path: spec.template.spec.containers[4].env[3].valueFrom.secretKeyRef.key
          value: token
      - equal:
          path: spec.template.spec.containers[4].env[3].valueFrom.secretKeyRef.name
          value: upcloud

  - it: controller UPCLOUD_TOKEN should use custom tokenKey
    set:
      credentials:
        tokenKey: my-token
    template: controller-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[4].env[3].name
          value: UPCLOUD_TOKEN
      - equal:
          path: spec.template.spec.containers[4].env[3].valueFrom.secretKeyRef.key
          value: my-token

