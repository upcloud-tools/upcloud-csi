suite: security context
tests:
  - it: should render default podSecurityContext on controller
    template: controller-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should render default container securityContext on all controller containers
    template: controller-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[1].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[2].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[3].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[4].securityContext.allowPrivilegeEscalation
          value: false

  - it: should render default podSecurityContext on node
    template: node-daemonset.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - notExists:
          path: spec.template.spec.securityContext.runAsNonRoot

  - it: should render default container securityContext on all node containers
    template: node-daemonset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.add[0]
          value: SYS_ADMIN
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: true
      - equal:
          path: spec.template.spec.containers[1].securityContext.privileged
          value: true

  - it: should render default podSecurityContext on snapshot controller
    template: snapshot-controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should render default container securityContext on snapshot controller
    template: snapshot-controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should render default podSecurityContext on webhook
    set:
      snapshotValidationWebhook:
        enabled: true
    template: snapshot-webhook.yaml
    documentIndex: 2
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should render default container securityContext on webhook
    set:
      snapshotValidationWebhook:
        enabled: true
    template: snapshot-webhook.yaml
    documentIndex: 2
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should allow overriding podSecurityContext on controller
    set:
      controller:
        podSecurityContext:
          runAsUser: 1000
          fsGroup: 2000
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
    template: controller-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should allow overriding container securityContext on node
    set:
      node:
        securityContext:
          privileged: false
          capabilities:
            drop: ["ALL"]
          allowPrivilegeEscalation: false
    template: node-daemonset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[1].securityContext.privileged
          value: false

  - it: should omit securityContext when set to null on controller
    set:
      controller:
        securityContext: null
        podSecurityContext: null
    template: controller-statefulset.yaml
    asserts:
      - notExists:
          path: spec.template.spec.securityContext
      - notExists:
          path: spec.template.spec.containers[0].securityContext
      - notExists:
          path: spec.template.spec.containers[4].securityContext
