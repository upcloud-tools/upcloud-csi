suite: extra objects
tests:
  - it: should not render anything when extraObjects is empty
    template: extra-objects.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a single extra object
    set:
      extraObjects:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: my-namespace
    template: extra-objects.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: kind
          value: Namespace
      - equal:
          path: metadata.name
          value: my-namespace

  - it: should render multiple extra objects
    set:
      extraObjects:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: ns-one
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: ns-two
    template: extra-objects.yaml
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.name
          value: ns-one
      - documentIndex: 1
        equal:
          path: metadata.name
          value: ns-two

  - it: should evaluate tpl expressions in extra objects
    set:
      extraObjects:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ .Values.nsName }}"
            labels:
              "{{ .Values.labelKey }}": "{{ .Values.labelValue }}"
      nsName: extra-ns
      labelKey: team
      labelValue: platform
    template: extra-objects.yaml
    asserts:
      - equal:
          path: metadata.name
          value: extra-ns
      - equal:
          path: metadata.labels.team
          value: platform
