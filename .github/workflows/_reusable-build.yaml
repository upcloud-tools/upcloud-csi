on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ''
      image_suffix:
        required: false
        type: string
        default: ''
      tags:
        required: true
        type: string

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build-image
        uses: aardbol/buildah-build@19b13acaef86fdcd664ee434704193633b5eee8b # v3.0.2
        with:
          image: ${{ github.repository }}${{ inputs.image_suffix }}
          tags: ${{ inputs.tags }}
          context: .
          containerfiles: cmd/upcloud-csi-plugin/Containerfile
          platforms: linux/amd64
          extra-args: --pull=always

      - name: Push image
        id: push-image
        uses: aardbol-actions/push-to-registry@c01ac5f8c8c99e7090c6e5773b13834ce221b9a9 # v3.0.1
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ inputs.tags }}
          registry: ${{ env.REGISTRY }}

      - name: Build summary
        run: |
          echo "## Container image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ steps.build-image.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags | \`${{ inputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${{ steps.push-image.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
