on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ''
      image_suffix:
        required: false
        type: string
        default: ''
      tags:
        required: true
        type: string
      go_version:
        required: false
        type: string
        default: '1.26'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}

      - name: Build Go binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-w -s" -o cmd/upcloud-csi-plugin/upcloud-csi-plugin github.com/upcloud-tools/upcloud-csi/cmd/upcloud-csi-plugin

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: ghcr.io/${{ github.repository }}${{ inputs.image_suffix }}
          tags: ${{ inputs.tags }}
          containerfiles: cmd/upcloud-csi-plugin/Containerfile
          context: cmd/upcloud-csi-plugin/
          platforms: linux/amd64

      - name: Push image
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io
