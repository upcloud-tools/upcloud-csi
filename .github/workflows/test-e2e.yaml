name: UpCloud CSI driver e2e test
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  TEST_IMAGE: ${{ github.repository }}-test
  GO_VERSION: '1.26'

jobs:
  build-image:
    uses: ./.github/workflows/_reusable-build.yaml
    with:
      checkout_ref: ${{ github.sha }}
      image_suffix: '-test'
      tags: ${{ github.sha }}
    secrets: inherit

  deploy:
    runs-on: ubuntu-24.04
    needs: build-image
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy CSI driver via Helm
        run: make helm-upgrade HELM_OPTS="--install --set image.repository=${{ env.REGISTRY }}/${{ env.TEST_IMAGE }} --set image.tag=${{ github.sha }}"

  e2e:
    runs-on: ubuntu-24.04
    needs: deploy
    strategy:
      fail-fast: false
      matrix:
        test-case: [SNAPSHOT, RESIZE_EXT4, RESIZE_XFS, LIST, CREATEDELETE, PERSISTENCE]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Run ${{ matrix.test-case }} e2e test
        id: test
        run: make test-e2e ${{ matrix.test-case }}=y
