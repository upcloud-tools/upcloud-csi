name: UpCloud CSI driver e2e test
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  TEST_IMAGE: ${{ github.repository }}-test
  GO_VERSION: '1.26'

jobs:
  build-image:
    uses: ./.github/workflows/reusable-build.yaml
    with:
      image_name: ${{ env.REGISTRY }}/${{ env.TEST_IMAGE }}
      tags: e2e-${{ github.sha }}
      go_version: ${{ env.GO_VERSION }}
    secrets: inherit

  e2e:
    runs-on: ubuntu-24.04
    needs: build-image
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy CSI driver manifests
        run: make deploy-manifests CONTAINER_REPO=${{ env.REGISTRY }}/${{ env.TEST_IMAGE }} IMAGE_TAG=e2e-${{ github.sha }}

      - name: Run e2e tests
        run: make test-e2e CONTAINER_REPO=${{ env.REGISTRY }}/${{ env.TEST_IMAGE }} IMAGE_TAG=e2e-${{ github.sha }}
