on:
  workflow_call:
    inputs:
      image_tag:
        required: false
        type: string
        default: latest

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  GO_VERSION: '1.26.5'

jobs:
  deploy:
    runs-on: [self-hosted, linux, upcloud-csi]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Install build tools
        if: runner.environment == 'self-hosted'
        run: |
          command -v make >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends make
          }

      - name: Install helm
        if: runner.environment == 'self-hosted'
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 3.21.2

      - name: Install kubectl
        if: runner.environment == 'self-hosted'
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 1.36.2

      - name: Deploy CSI driver via Helm
        run: |
          make deploy-test \
            HELM_OPTS="--set image.repository=${{ env.REGISTRY }}/${{ github.repository }} --set image.tag=${{ inputs.image_tag }}"
  e2e:
    needs: deploy
    runs-on: [self-hosted, linux, upcloud-csi]
    strategy:
      fail-fast: false
      matrix:
        test-case: [SNAPSHOT, RESIZE_EXT4, RESIZE_XFS, RESIZE_UNATTACHED, LIST, CREATEDELETE, PERSISTENCE, NETPOL, WEBHOOK, WEBHOOK_CM, FILESTORAGE, FS_EXPAND, FS_CONCURRENT]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install build tools
        if: runner.environment == 'self-hosted'
        run: |
          command -v make >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends make
          }

      - name: Install helm
        if: runner.environment == 'self-hosted'
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 3.21.2

      - name: Install kubectl
        if: runner.environment == 'self-hosted'
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 1.36.2

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Run ${{ matrix.test-case }} e2e test
        id: test
        run: make test-e2e-ci ${{ matrix.test-case }}=y
