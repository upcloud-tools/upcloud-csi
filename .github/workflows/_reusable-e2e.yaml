on:
  workflow_call:
    inputs:
      image_tag:
        required: false
        type: string
        default: latest

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GO_VERSION: '1.26'

jobs:
  deploy:
    runs-on: [self-hosted, linux, upcloud-csi]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Install build tools
        if: runner.environment == 'self-hosted'
        run: |
          command -v make >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends make
          }

      - name: Install helm
        if: runner.environment == 'self-hosted'
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 3.21.2

      - name: Install kubectl
        if: runner.environment == 'self-hosted'
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 1.36.2

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --version v1.20.3 \
            --set crds.enabled=true
          kubectl wait --namespace cert-manager --for=condition=Available deployment cert-manager --timeout=180s
          kubectl wait --namespace cert-manager --for=condition=Available deployment cert-manager-webhook --timeout=180s

      - name: Create e2e ClusterIssuer for webhook test
        run: |
          kubectl apply -f - <<EOF
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: e2e-selfsigned
          spec:
            selfSigned: {}
          EOF

      - name: Deploy CSI driver via Helm
        run: |
          make deploy-test \
            HELM_OPTS="--set image.repository=${{ env.REGISTRY }}/${{ github.repository }} --set image.tag=${{ inputs.image_tag }}"
  e2e:
    needs: deploy
    runs-on: [self-hosted, linux, upcloud-csi]
    strategy:
      fail-fast: false
      matrix:
        test-case: [SNAPSHOT, RESIZE_EXT4, RESIZE_XFS, RESIZE_UNATTACHED, LIST, CREATEDELETE, PERSISTENCE, NETPOL, WEBHOOK, WEBHOOK_CM]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install build tools
        if: runner.environment == 'self-hosted'
        run: |
          command -v make >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends make
          }

      - name: Install helm
        if: runner.environment == 'self-hosted'
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 3.21.2

      - name: Install kubectl
        if: runner.environment == 'self-hosted'
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 1.36.2

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Run ${{ matrix.test-case }} e2e test
        id: test
        run: make test-e2e-ci ${{ matrix.test-case }}=y
