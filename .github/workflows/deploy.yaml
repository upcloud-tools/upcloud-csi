name: Build and push container image

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    uses: ./.github/workflows/reusable-build.yaml
    with:
      tags: |
        ${{ github.ref_name }}
        ${{ startsWith(github.ref, 'refs/tags/') && 'latest' || '' }}
        ${{ github.ref_type != 'tag' && github.sha || '' }}
    secrets: inherit
