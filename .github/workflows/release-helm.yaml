name: Release Helm chart

on:
  push:
    branches: [main]
    paths:
      - deploy/helm/Chart.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CHART_DIR: deploy/helm
  REGISTRY: ghcr.io
  CHART_OCI_REPO: ${{ github.repository_owner }}/charts

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      skip: ${{ steps.check.outputs.skip_release }}
      chart_version: ${{ steps.check.outputs.chart_version }}
      app_version_bumped: ${{ steps.check.outputs.app_version_bumped }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check version bump
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chart_version=$(yq .version "$CHART_DIR/Chart.yaml")
          app_version=$(yq .appVersion deploy/helm/Chart.yaml)
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"

          if gh release view "helm-v$chart_version" > /dev/null 2>&1; then
            echo "Release helm-v$chart_version already exists. Skipping."
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip_release=false" >> "$GITHUB_OUTPUT"

          if gh release view "$app_version" > /dev/null 2>&1; then
            echo "app_version_bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $app_version has changed. Leaving E2E tests to release-app action."
            echo "app_version_bumped=true" >> "$GITHUB_OUTPUT"
          fi

  # The E2E tests are run when the chart version is bumped, but will be skipped if the appVersion
  # has been bumped as well. The release-app action will then run the E2E tests instead.
  e2e:
    needs: detect
    if: ${{ needs.detect.outputs.skip == 'false' && needs.detect.outputs.app_version_bumped == 'false' }}
    uses: ./.github/workflows/_reusable-e2e.yaml
    secrets: inherit

  release-helm:
    needs: [detect, e2e]
    if: ${{ always() && needs.detect.outputs.skip == 'false' && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release notes
        run: make helm-release-notes > .release_notes

      - name: Package chart
        run: |
          mkdir -p dist
          helm package ${{ env.CHART_DIR }} --destination dist

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign chart package
        run: |
          cosign sign-blob dist/*.tgz \
            --bundle dist/*.tgz.sigstore.json \
            --yes

      - name: Push chart to GHCR OCI
        run: |
          helm push dist/*.tgz oci://${{ env.REGISTRY }}/${{ env.CHART_OCI_REPO }}

      - name: Push Artifact Hub metadata
        run: |
          chart_name=$(yq .name "$CHART_DIR/Chart.yaml")
          oras push ${{ env.REGISTRY }}/${{ env.CHART_OCI_REPO }}/${chart_name}:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          is_prerelease="false"
          if [[ "${{ needs.detect.outputs.chart_version }}" == *-* ]]; then
            is_prerelease="true"
          fi
          gh release create "helm-v${{ needs.detect.outputs.chart_version }}" \
            dist/*.tgz \
            dist/*.sigstore.json \
            --notes-file .release_notes \
            --title "helm-v${{ needs.detect.outputs.chart_version }}" \
            --draft \
            $([[ "$is_prerelease" == "true" ]] && echo "--prerelease")
