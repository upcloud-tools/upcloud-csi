name: Helm Lint

on:
  pull_request:
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/golang-lint.yaml'

jobs:
  helm-lint:
    name: helm-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run helm lint
        run: make helm-lint
