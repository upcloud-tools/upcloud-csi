version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    groups:
      kubernetes:
        patterns:
          - k8s.io/*
      grpc:
        patterns:
          - google.golang.org/grpc
          - google.golang.org/genproto

  - package-ecosystem: "github-actions"
    commit-message:
      prefix: chore(actions)
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /cmd/upcloud-csi-plugin
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: "devcontainers" # https://containers.dev/guide/dependabot
    directory: "/"
    schedule:
      interval: weekly
      day: monday
