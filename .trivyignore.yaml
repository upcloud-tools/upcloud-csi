vulnerabilities:
  - id: CVE-2026-25680
    expiry: 2027-06-24
    statement: >
      goldmark is pulled in transitively by golang.org/x/tools
      (required by ginkgo for label resolution). It is not linked
      into the CSI driver binary and has no security impact on
      the application.
  - id: CVE-2026-25681
    expiry: 2027-06-24
    statement: >
      Same as CVE-2026-25680 — indirect tooling dependency via
      x/tools, not used by CSI driver code.
